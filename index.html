<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="shortcut icon" type="image/x-icon" href="favicon.ico">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ConcertsDB by MorciMetálciGrupci</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0a0a0a;
    --surface:  #111111;
    --surface2: #1a1a1a;
    --border:   #2a2a2a;
    --accent:   #ff8753;
    --accent2:  #ff4747;
    --text:     #e8e8e8;
    --muted:    #666;
    --luki:     #4fc3f7;
    --sanyi:    #81c784;
    --arpi:     #ffb74d;
    --upcoming: #a78bfa;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'IBM Plex Sans', sans-serif; font-size: 14px; min-height: 100vh; }

  header {
    border-bottom: 1px solid var(--border); padding: 0 32px;
    display: flex; align-items: center; gap: 40px; height: 56px;
    position: sticky; top: 0; background: var(--bg); z-index: 100;
  }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 3px; color: var(--accent); line-height: 1; flex-shrink: 0; }
  .logo span { color: var(--muted); font-size: 14px; letter-spacing: 1px; margin-left: 8px; font-family: 'IBM Plex Mono', monospace; }
  nav { display: flex; gap: 4px; }
  nav button {
    background: none; border: 1px solid transparent; color: var(--muted);
    font-family: 'IBM Plex Mono', monospace; font-size: 12px; padding: 6px 14px;
    cursor: pointer; letter-spacing: 1px; text-transform: uppercase;
    transition: all 0.15s; border-radius: 2px;
  }
  nav button:hover { color: var(--text); border-color: var(--border); }
  nav button.active { color: var(--accent); border-color: var(--accent); background: rgba(255,135,83,0.06); }
  #status-bar { margin-left: auto; font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted); }
  #status-bar.loading { color: var(--accent); }
  #status-bar.error   { color: var(--accent2); }

  .logout-btn {
    background: none; border: 1px solid var(--border); color: var(--muted);
    font-family: 'IBM Plex Mono', monospace; font-size: 11px; padding: 5px 10px;
    cursor: pointer; border-radius: 2px; transition: all 0.15s;
    text-transform: uppercase; letter-spacing: 1px; text-decoration: none;
    display: inline-block;
  }
  .logout-btn:hover { color: var(--accent2); border-color: var(--accent2); }

  main { padding: 28px 32px; max-width: 1400px; }

  .filters { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
  .filters input, .filters select {
    background: var(--surface); border: 1px solid var(--border); color: var(--text);
    font-family: 'IBM Plex Mono', monospace; font-size: 12px; padding: 8px 12px;
    border-radius: 2px; outline: none; transition: border-color 0.15s;
  }
  .filters input:focus, .filters select:focus { border-color: var(--accent); }
  .filters input[type="text"] { width: 220px; }
  .filters select { cursor: pointer; }
  .filter-label { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .clear-btn {
    background: none; border: 1px solid var(--border); color: var(--muted);
    font-family: 'IBM Plex Mono', monospace; font-size: 11px; padding: 8px 12px;
    cursor: pointer; border-radius: 2px; transition: all 0.15s;
    text-transform: uppercase; letter-spacing: 1px;
  }
  .clear-btn:hover { color: var(--accent2); border-color: var(--accent2); }

  .stats-row { display: flex; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); padding: 14px 20px; border-radius: 2px; min-width: 120px; }
  .stat-card .val { font-family: 'Bebas Neue', sans-serif; font-size: 32px; line-height: 1; color: var(--accent); }
  .stat-card .lbl { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }

  .table-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: 2px; }
  table { width: 100%; border-collapse: collapse; }
  thead th {
    background: var(--surface2); font-family: 'IBM Plex Mono', monospace;
    font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted);
    padding: 10px 14px; text-align: left; border-bottom: 1px solid var(--border);
    white-space: nowrap; cursor: pointer; user-select: none;
  }
  thead th:hover { color: var(--text); }
  thead th.sorted { color: var(--accent); }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--surface2); }
  tbody tr.cancelled { opacity: 0.5; }
  tbody td { padding: 9px 14px; font-size: 13px; vertical-align: middle; }
  td.date-col { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--muted); white-space: nowrap; }

  .person-badges { display: flex; gap: 4px; flex-wrap: wrap; }
  .badge { font-family: 'IBM Plex Mono', monospace; font-size: 10px; font-weight: 500; padding: 2px 6px; border-radius: 2px; letter-spacing: 0.5px; }
  .badge-L     { background: rgba(79,195,247,0.15); color: var(--luki); border: 1px solid rgba(79,195,247,0.3); }
  .badge-S     { background: rgba(129,199,132,0.15); color: var(--sanyi); border: 1px solid rgba(129,199,132,0.3); }
  .badge-Á     { background: rgba(255,183,77,0.15); color: var(--arpi); border: 1px solid rgba(255,183,77,0.3); }
  .badge-other { background: rgba(255,255,255,0.05); color: var(--muted); border: 1px solid var(--border); }

  .band-tags { display: flex; gap: 6px; flex-wrap: wrap; align-items: flex-start; }
  .band-entry { display: inline-flex; align-items: center; gap: 2px; }
  .band-tag { font-size: 12px; padding: 2px 8px; border-radius: 2px; border: 1px solid var(--border); color: var(--text); cursor: pointer; transition: all 0.1s; white-space: nowrap; }
  .band-tag:hover { border-color: var(--accent); color: var(--accent); }
  .band-tag.cancelled-band { opacity: 0.35; color: var(--accent2); border-color: rgba(255,71,71,0.3); }

  /* Per-band person indicator badges */
  .bpi {
    display: inline-flex; align-items: center; justify-content: center;
    font-family: 'IBM Plex Mono', monospace; font-size: 8px; font-weight: 700;
    width: 13px; height: 13px; border-radius: 2px; position: relative; flex-shrink: 0; line-height: 1;
  }
  .bpi-seen-L { color: var(--luki);  background: rgba(79,195,247,0.18);  border: 1px solid rgba(79,195,247,0.5); }
  .bpi-seen-S { color: var(--sanyi); background: rgba(129,199,132,0.18); border: 1px solid rgba(129,199,132,0.5); }
  .bpi-seen-Á { color: var(--arpi);  background: rgba(255,183,77,0.18);  border: 1px solid rgba(255,183,77,0.5); }
  .bpi-skip-L { color: rgba(79,195,247,0.5);  background: transparent; border: 1px solid rgba(79,195,247,0.2); }
  .bpi-skip-S { color: rgba(129,199,132,0.5); background: transparent; border: 1px solid rgba(129,199,132,0.2); }
  .bpi-skip-Á { color: rgba(255,183,77,0.5);  background: transparent; border: 1px solid rgba(255,183,77,0.2); }
  .bpi-hate-L, .bpi-hate-S, .bpi-hate-Á { color: rgba(200,80,80,0.7); background: rgba(255,71,71,0.08); border: 1px solid rgba(255,71,71,0.3); }
  .bpi-skip-L::after, .bpi-skip-S::after, .bpi-skip-Á::after {
    content: ''; position: absolute; inset: 1px;
    background: linear-gradient(to bottom right, transparent calc(50% - 0.5px), currentColor calc(50% - 0.5px), currentColor calc(50% + 0.5px), transparent calc(50% + 0.5px));
    opacity: 0.7;
  }
  .bpi-hate-L::after, .bpi-hate-S::after, .bpi-hate-Á::after {
    content: '✕'; position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 7px; color: var(--accent2); font-family: sans-serif;
  }

  /* Venue/city/country cell */
  .venue-line { font-size: 13px; }
  .loc-line { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--muted); margin-top: 2px; }

  .status-pill { font-family: 'IBM Plex Mono', monospace; font-size: 10px; padding: 2px 7px; border-radius: 2px; text-transform: uppercase; letter-spacing: 0.5px; }
  .status-past      { background: rgba(255,255,255,0.05); color: var(--muted); }
  .status-cancelled { background: rgba(255,71,71,0.1); color: var(--accent2); }
  .status-upcoming  { background: rgba(167,139,250,0.12); color: var(--upcoming); border: 1px solid rgba(167,139,250,0.25); }
  .status-review    { background: rgba(255,71,71,0.12); color: var(--accent2); border: 1px solid rgba(255,71,71,0.3); }

  tbody tr.review-row { background: rgba(255,71,71,0.05); }
  tbody tr.review-row:hover { background: rgba(255,71,71,0.1); }

  td.edit-col { width: 32px; padding: 0 6px; text-align: center; }
  .edit-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 13px; padding: 4px 6px; border-radius: 2px; transition: all 0.15s; line-height: 1; }
  .edit-btn:hover { color: var(--accent); background: rgba(255,135,83,0.08); }

  nav button.nav-add { color: var(--accent); }
  nav button.nav-add.active { color: var(--accent); border-color: var(--accent); background: rgba(255,135,83,0.06); }

  .view { display: none; }
  .view.active { display: block; }

  /* ── BANDS VIEW ── */
  .bands-filters { display: flex; gap: 12px; margin-bottom: 16px; align-items: center; flex-wrap: wrap; }
  .bands-filters input[type="text"] {
    background: var(--surface); border: 1px solid var(--border); color: var(--text);
    font-family: 'IBM Plex Mono', monospace; font-size: 12px; padding: 8px 12px;
    border-radius: 2px; outline: none; width: 260px; transition: border-color 0.15s;
  }
  .bands-filters input[type="text"]:focus { border-color: var(--accent); }
  .person-checkboxes { display: flex; gap: 8px; align-items: center; }
  .person-checkbox-label {
    display: flex; align-items: center; gap: 5px; cursor: pointer;
    font-family: 'IBM Plex Mono', monospace; font-size: 12px; padding: 6px 10px;
    border: 1px solid var(--border); border-radius: 2px; transition: all 0.15s;
    user-select: none;
  }
  .person-checkbox-label:hover { border-color: var(--text); }
  .person-checkbox-label input { display: none; }
  .person-checkbox-label.checked-L { color: var(--luki); border-color: var(--luki); background: rgba(79,195,247,0.08); }
  .person-checkbox-label.checked-S { color: var(--sanyi); border-color: var(--sanyi); background: rgba(129,199,132,0.08); }
  .person-checkbox-label.checked-Á { color: var(--arpi); border-color: var(--arpi); background: rgba(255,183,77,0.08); }

  /* ── STATS VIEW ── */
  .stats-person-tabs { display: flex; gap: 8px; margin-bottom: 24px; }
  .person-tab { padding: 10px 24px; border: 1px solid var(--border); background: none; cursor: pointer; font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 2px; border-radius: 2px; transition: all 0.15s; color: var(--muted); }
  .person-tab:hover { color: var(--text); border-color: var(--text); }
  .person-tab.active-L { color: var(--luki); border-color: var(--luki); background: rgba(79,195,247,0.08); }
  .person-tab.active-S { color: var(--sanyi); border-color: var(--sanyi); background: rgba(129,199,132,0.08); }
  .person-tab.active-Á { color: var(--arpi); border-color: var(--arpi); background: rgba(255,183,77,0.08); }
  .person-tab.active-ALL { color: var(--accent); border-color: var(--accent); background: rgba(255,135,83,0.08); }

  .top-bands-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 8px; margin-top: 16px; }
  .top-band-card { background: var(--surface); border: 1px solid var(--border); padding: 12px 16px; border-radius: 2px; display: flex; align-items: center; gap: 14px; cursor: pointer; transition: border-color 0.1s; }
  .top-band-card:hover { border-color: var(--accent); }
  .top-band-rank { font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: var(--border); width: 28px; text-align: right; flex-shrink: 0; }
  .top-band-name { font-size: 13px; flex: 1; }
  .top-band-count { font-family: 'IBM Plex Mono', monospace; font-size: 14px; font-weight: 500; flex-shrink: 0; }
  .count-L { color: var(--luki); }
  .count-S { color: var(--sanyi); }
  .count-Á { color: var(--arpi); }
  .count-ALL { color: var(--accent); }

  #loading-overlay {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 999; gap: 16px;
  }
  #loading-overlay .logo-big { font-family: 'Bebas Neue', sans-serif; font-size: 64px; letter-spacing: 8px; color: var(--accent); }
  #loading-overlay .loading-msg { font-family: 'IBM Plex Mono', monospace; font-size: 13px; color: var(--muted); }
  .dot-anim::after { content: ''; animation: dots 1.5s infinite; }
  @keyframes dots { 0%{content:'.'} 33%{content:'..'} 66%{content:'...'} 100%{content:''} }
  #loading-overlay.hidden { display: none; }

  .empty-state { padding: 48px; text-align: center; color: var(--muted); font-family: 'IBM Plex Mono', monospace; font-size: 13px; }
  .result-count { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted); margin-bottom: 12px; }
  .result-count span { color: var(--accent); }

  /* ══ FORM MODAL ══ */
  #form-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.78); z-index: 200; overflow-y: auto; padding: 40px 20px; }
  #form-overlay.open { display: flex; align-items: flex-start; justify-content: center; }
  #event-form-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 3px; width: 100%; max-width: 820px; padding: 32px; }

  .form-header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 28px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
  .form-title { font-family: 'Bebas Neue', sans-serif; font-size: 30px; letter-spacing: 3px; color: var(--accent); }
  .form-close { background: none; border: 1px solid var(--border); color: var(--muted); font-family: 'IBM Plex Mono', monospace; font-size: 12px; padding: 5px 10px; cursor: pointer; border-radius: 2px; transition: all 0.15s; }
  .form-close:hover { color: var(--accent2); border-color: var(--accent2); }

  .form-section { margin-bottom: 28px; }
  .form-section-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: var(--muted); margin-bottom: 14px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }

  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .form-field { display: flex; flex-direction: column; gap: 6px; }
  .form-field.span-2 { grid-column: span 2; }
  .form-field label { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .form-field input, .form-field select, .form-field textarea { background: #0d0d0d; border: 1px solid var(--border); color: var(--text); font-family: 'IBM Plex Mono', monospace; font-size: 13px; padding: 9px 12px; border-radius: 2px; outline: none; transition: border-color 0.15s; width: 100%; }
  .form-field input:focus, .form-field select:focus, .form-field textarea:focus { border-color: var(--accent); }
  .form-field textarea { resize: vertical; min-height: 72px; font-family: 'IBM Plex Sans', sans-serif; font-size: 13px; }
  .form-field select option { background: #111; }

  .price-row { display: flex; gap: 10px; }
  .price-row input { flex: 1; }
  .price-row select { width: 110px; flex-shrink: 0; }

  .attendee-toggles { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .person-toggle { font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 1px; padding: 6px 16px; border-radius: 2px; cursor: pointer; border: 1px solid var(--border); background: none; color: var(--muted); transition: all 0.15s; }
  .person-toggle[data-code="L"].active  { color: var(--luki);  border-color: var(--luki);  background: rgba(79,195,247,0.12); }
  .person-toggle[data-code="S"].active  { color: var(--sanyi); border-color: var(--sanyi); background: rgba(129,199,132,0.12); }
  .person-toggle[data-code="Á"].active  { color: var(--arpi);  border-color: var(--arpi);  background: rgba(255,183,77,0.12); }
  .person-toggle.active-other { color: var(--text); border-color: var(--text); background: rgba(255,255,255,0.06); }
  .add-person-btn { font-family: 'IBM Plex Mono', monospace; font-size: 11px; padding: 6px 12px; border: 1px dashed var(--border); background: none; color: var(--muted); cursor: pointer; border-radius: 2px; transition: all 0.15s; }
  .add-person-btn:hover { color: var(--accent); border-color: var(--accent); }

  #band-rows { display: flex; flex-direction: column; gap: 10px; margin-bottom: 10px; }
  .band-row { display: grid; grid-template-columns: 1fr 120px auto auto; gap: 10px; align-items: center; background: #0d0d0d; border: 1px solid var(--border); padding: 10px 14px; border-radius: 2px; }
  .band-row-attendees { display: flex; gap: 6px; align-items: center; }
  .band-person-toggle { font-family: 'Bebas Neue', sans-serif; font-size: 15px; letter-spacing: 1px; padding: 4px 10px; border-radius: 2px; cursor: pointer; border: 1px solid var(--border); background: none; color: var(--muted); transition: all 0.15s; }
  .band-person-toggle[data-code="L"].active  { color: var(--luki);  border-color: var(--luki);  background: rgba(79,195,247,0.12); }
  .band-person-toggle[data-code="S"].active  { color: var(--sanyi); border-color: var(--sanyi); background: rgba(129,199,132,0.12); }
  .band-person-toggle[data-code="Á"].active  { color: var(--arpi);  border-color: var(--arpi);  background: rgba(255,183,77,0.12); }
  .band-person-toggle.active-other { color: var(--text); border-color: var(--text); background: rgba(255,255,255,0.06); }
  .band-status-toggle { font-family: 'IBM Plex Mono', monospace; font-size: 11px; padding: 6px 10px; border: 1px solid var(--border); background: none; color: var(--muted); cursor: pointer; border-radius: 2px; transition: all 0.15s; text-transform: uppercase; letter-spacing: 0.5px; width: 110px; text-align: center; }
  .band-status-toggle.cancelled { color: var(--accent2); border-color: rgba(255,71,71,0.4); background: rgba(255,71,71,0.06); }
  .band-remove-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px; padding: 4px 6px; border-radius: 2px; transition: color 0.15s; line-height: 1; }
  .band-remove-btn:hover { color: var(--accent2); }
  .add-band-btn { display: flex; align-items: center; gap: 8px; font-family: 'IBM Plex Mono', monospace; font-size: 12px; padding: 9px 14px; border: 1px dashed var(--border); background: none; color: var(--muted); cursor: pointer; border-radius: 2px; transition: all 0.15s; width: 100%; }
  .add-band-btn:hover { color: var(--accent); border-color: var(--accent); }

  .typeahead-wrap { position: relative; }
  .typeahead-input { width: 100%; background: #0d0d0d; border: 1px solid var(--border); color: var(--text); font-family: 'IBM Plex Mono', monospace; font-size: 13px; padding: 9px 12px; border-radius: 2px; outline: none; transition: border-color 0.15s; }
  .typeahead-input:focus { border-color: var(--accent); }
  .typeahead-input.new-band { border-color: var(--accent); }
  .typeahead-dropdown { position: absolute; top: 100%; left: 0; right: 0; background: #1a1a1a; border: 1px solid var(--border); border-top: none; z-index: 50; max-height: 200px; overflow-y: auto; border-radius: 0 0 2px 2px; }
  .typeahead-item { padding: 8px 12px; cursor: pointer; font-family: 'IBM Plex Mono', monospace; font-size: 12px; transition: background 0.1s; }
  .typeahead-item:hover, .typeahead-item.kbd-active { background: var(--surface2); color: var(--accent); }
  .typeahead-item.new-entry { color: var(--accent); border-top: 1px solid var(--border); }
  .typeahead-item.new-entry::before { content: '+ '; }

  .form-actions { display: flex; gap: 10px; align-items: center; padding-top: 20px; border-top: 1px solid var(--border); margin-top: 8px; flex-wrap: wrap; }
  .btn-save { background: var(--accent); color: #000; border: none; font-family: 'IBM Plex Mono', monospace; font-size: 12px; font-weight: 500; padding: 10px 24px; cursor: pointer; border-radius: 2px; transition: opacity 0.15s; text-transform: uppercase; letter-spacing: 1px; }
  .btn-save:hover { opacity: 0.85; }
  .btn-save:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-cancel-form { background: none; border: 1px solid var(--border); color: var(--muted); font-family: 'IBM Plex Mono', monospace; font-size: 12px; padding: 10px 18px; cursor: pointer; border-radius: 2px; transition: all 0.15s; text-transform: uppercase; }
  .btn-cancel-form:hover { color: var(--text); border-color: var(--text); }
  .btn-mark-cancelled { background: none; border: 1px solid rgba(255,71,71,0.3); color: var(--accent2); font-family: 'IBM Plex Mono', monospace; font-size: 12px; padding: 10px 18px; cursor: pointer; border-radius: 2px; transition: all 0.15s; text-transform: uppercase; margin-left: auto; }
  .btn-mark-cancelled:hover { background: rgba(255,71,71,0.08); border-color: var(--accent2); }

<script>
const API_URL = 'api.php?action=load_all';

let DB = { events: [], bands: [], event_bands: [], attendance: [], people: [] };
let filteredEvents = [];
let sortCol = 'date', sortDir = -1;

let bandsData = [];
let filteredBands = [];
let bandSortCol = 'times_seen', bandSortDir = -1;

let currentStatsPerson = 'L';

async function loadAll() {
  try {
    setStatus('loading', 'Loading…');
    fetch('api.php', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'review_sweep' }) }).catch(() => {});
    const r = await fetch(API_URL);
    if (r.status === 401) { window.location.href = 'login.php'; return; }
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    if (data.error) throw new Error(data.error);

    data.attendance = data.attendance.map(a => ({ ...a, was_at_event: a.was_at_event === 'True', did_see: a.did_see === 'True', hated_it: a.hated_it === 'True' }));
    data.events      = data.events.map(e => ({ ...e, event_id: String(e.event_id) }));
    data.bands       = data.bands.map(b => ({ ...b, band_id: String(b.band_id) }));
    data.event_bands = data.event_bands.map(eb => ({ ...eb, event_id: String(eb.event_id), band_id: String(eb.band_id), event_band_id: String(eb.event_band_id) }));
    data.attendance  = data.attendance.map(a => ({ ...a, event_id: String(a.event_id), band_id: String(a.band_id), event_band_id: String(a.event_band_id) }));

    DB = data;
    setStatus('ok', `${DB.events.length} events · ${DB.bands.length} bands`);
    document.getElementById('loading-overlay').classList.add('hidden');
    init();
  } catch(e) {
    setStatus('error', e.message);
    const msg = document.querySelector('#loading-overlay .loading-msg');
    msg.textContent = '⚠ ' + e.message;
    msg.style.color = '#ff4747';
    msg.classList.remove('dot-anim');
  }
}

function setStatus(type, msg) {
  const el = document.getElementById('status-bar');
  el.textContent = msg;
  el.className = type === 'loading' ? 'loading' : type === 'error' ? 'error' : '';
}

function init() {
  buildFilters();
  filteredEvents = [...DB.events];
  sortEvents();
  renderConcertStats();
  renderTable();
  computeBandsData();
  filteredBands = [...bandsData];
  renderBandsTable();
  setStatsPerson('L');
}

function getBandsForEvent(event_id) {
  return DB.event_bands.filter(eb => eb.event_id === event_id).map(eb => {
    const band = DB.bands.find(b => b.band_id === eb.band_id);
    return { name: band?.band_name || '?', status: eb.status, band_id: eb.band_id };
  });
}

function getAttendeesForEvent(event_id) {
  const seen = new Set();
  DB.attendance.forEach(a => { if (a.event_id === event_id && a.was_at_event) seen.add(a.person_code); });
  return seen;
}

function buildFilters() {
  const years = [...new Set(DB.events.map(e => e.date?.slice(0,4)).filter(y => y?.match(/^\d{4}$/)))].sort().reverse();
  const yearSel = document.getElementById('f-year');
  years.forEach(y => { const o = document.createElement('option'); o.value = y; o.textContent = y; yearSel.appendChild(o); });
  const cities = [...new Set(DB.events.map(e => e.city).filter(Boolean))].sort();
  const citySel = document.getElementById('f-city');
  cities.forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = c; citySel.appendChild(o); });
}

function applyFilters() {
  const search = document.getElementById('f-search').value.toLowerCase().trim();
  const year   = document.getElementById('f-year').value;
  const city   = document.getElementById('f-city').value;
  const person = document.getElementById('f-person').value;
  const seen   = document.getElementById('f-seen').value;
  const status = document.getElementById('f-status').value;

  const eventBandsMap = {};
  DB.event_bands.forEach(eb => {
    if (!eventBandsMap[eb.event_id]) eventBandsMap[eb.event_id] = [];
    const band = DB.bands.find(b => b.band_id === eb.band_id);
    if (band) eventBandsMap[eb.event_id].push(band.band_name.toLowerCase());
  });
  const eventAttendeesMap = {};
  DB.attendance.forEach(a => {
    if (!a.was_at_event) return;
    if (!eventAttendeesMap[a.event_id]) eventAttendeesMap[a.event_id] = new Set();
    eventAttendeesMap[a.event_id].add(a.person_code);
  });

  filteredEvents = DB.events.filter(ev => {
    if (year   && !ev.date?.startsWith(year)) return false;
    if (city   && ev.city !== city)           return false;
    if (status && ev.status !== status)       return false;
    if (person && !(eventAttendeesMap[ev.event_id] || new Set()).has(person)) return false;
    if (seen && person) {
      // Filter events where the selected person has at least one band matching the seen state
      const matches = DB.attendance.filter(a => a.event_id === ev.event_id && a.person_code === person);
      let found = false;
      for (const a of matches) {
        if (seen === 'seen' && a.did_see)                          { found = true; break; }
        if (seen === 'skip' && a.was_at_event && !a.did_see && !a.hated_it) { found = true; break; }
        if (seen === 'hate' && a.hated_it)                         { found = true; break; }
      }
      if (!found) return false;
    }
    if (search) {
      const bands = (eventBandsMap[ev.event_id] || []).join(' ');
      const haystack = [ev.date, ev.city, ev.venue, ev.festival, ev.tour, bands].join(' ').toLowerCase();
      if (!haystack.includes(search)) return false;
    }
    return true;
  });

  sortEvents();
  renderConcertStats();
  renderTable();
}

function clearFilters() {
  ['f-search','f-year','f-city','f-person','f-seen','f-status'].forEach(id => {
    const el = document.getElementById(id);
    if (el.tagName === 'INPUT') el.value = ''; else el.selectedIndex = 0;
  });
  applyFilters();
}

function sortBy(col) {
  if (sortCol === col) sortDir *= -1; else { sortCol = col; sortDir = -1; }
  document.querySelectorAll('thead th').forEach(th => th.classList.remove('sorted'));
  if (col === 'date') document.getElementById('th-date').classList.add('sorted');
  sortEvents();
  renderTable();
}

function sortEvents() {
  filteredEvents.sort((a, b) => {
    const av = a[sortCol] || '', bv = b[sortCol] || '';
    return av < bv ? sortDir : av > bv ? -sortDir : 0;
  });
}

function renderConcertStats() {
  const past      = filteredEvents.filter(e => e.status === 'past').length;
  const cancelled = filteredEvents.filter(e => e.status === 'cancelled').length;
  const upcoming  = filteredEvents.filter(e => e.status === 'upcoming').length;
  const review    = filteredEvents.filter(e => e.status === 'review').length;
  const uniqueBands = new Set(DB.event_bands.filter(eb => filteredEvents.some(e => e.event_id === eb.event_id)).map(eb => eb.band_id)).size;
  document.getElementById('concert-stats-row').innerHTML = `
    <div class="stat-card"><div class="val">${filteredEvents.length}</div><div class="lbl">Events shown</div></div>
    <div class="stat-card"><div class="val">${past}</div><div class="lbl">Past</div></div>
    <div class="stat-card"><div class="val">${upcoming}</div><div class="lbl">Upcoming</div></div>
    ${review ? `<div class="stat-card" style="border-color:rgba(255,71,71,0.3)"><div class="val" style="color:var(--accent2)">${review}</div><div class="lbl" style="color:var(--accent2)">Review!</div></div>` : ''}
    <div class="stat-card"><div class="val">${cancelled}</div><div class="lbl">Cancelled</div></div>
    <div class="stat-card"><div class="val">${uniqueBands}</div><div class="lbl">Unique bands</div></div>`;
  document.getElementById('result-count').innerHTML =
    filteredEvents.length > 0 ? `Showing <span>${filteredEvents.length}</span> events` : '';
}

function renderTable() {
  const MAIN = ['L','S','Á'];
  const tbody = document.getElementById('concerts-tbody');
  if (filteredEvents.length === 0) {
    tbody.innerHTML = `<tr><td colspan="8" class="empty-state">No concerts match your filters.</td></tr>`;
    return;
  }

  // Build per-band attendance lookup: eventId+bandId -> {personCode -> {did_see, hated_it, was_at_event}}
  const attMap = {};
  DB.attendance.forEach(a => {
    const key = `${a.event_id}|${a.band_id}`;
    if (!attMap[key]) attMap[key] = {};
    attMap[key][a.person_code] = { did_see: a.did_see, hated_it: a.hated_it, was_at: a.was_at_event };
  });

  tbody.innerHTML = filteredEvents.map(ev => {
    const bands     = getBandsForEvent(ev.event_id);
    const attendees = getAttendeesForEvent(ev.event_id);
    const festTour  = ev.festival || ev.tour || '';
    const isReview  = ev.status === 'review';

    // Venue/city/country cell
    const locParts = [ev.city, ev.country].filter(Boolean).join(' · ');
    const venueCell = `<div class="venue-line">${ev.venue||''}</div>${locParts ? `<div class="loc-line">${locParts}</div>` : ''}`;

    // Band tags with per-band person indicators
    const bandTags = bands.map(b => {
      const key = `${ev.event_id}|${b.band_id}`;
      const bAtt = attMap[key] || {};
      const indicators = MAIN
        .filter(code => attendees.has(code)) // only show for people who were at the event
        .map(code => {
          const pa = bAtt[code];
          if (!pa || !pa.was_at) return '';
          let cls;
          if (pa.did_see)        cls = `bpi-seen-${code}`;
          else if (pa.hated_it)  cls = `bpi-hate-${code}`;
          else                   cls = `bpi-skip-${code}`;
          return `<span class="bpi ${cls}">${code}</span>`;
        }).join('');
      return `<span class="band-entry"><span class="band-tag ${b.status==='cancelled'?'cancelled-band':''}" onclick="goBand(${JSON.stringify(b.name)})">${b.name}</span>${indicators}</span>`;
    }).join('');

    const badges = [...attendees]
      .sort((a,b) => { const ai=MAIN.indexOf(a),bi=MAIN.indexOf(b); return (ai===-1?99:ai)-(bi===-1?99:bi); })
      .map(code => {
        const cls  = MAIN.includes(code) ? `badge-${code}` : 'badge-other';
        const name = DB.people.find(p=>p.person_code===code)?.person_name || code;
        return `<span class="badge ${cls}" title="${name}">${code}</span>`;
      }).join('');
    const reviewFlag = isReview ? `<span style="color:var(--accent2);font-weight:700;margin-right:5px;font-family:'IBM Plex Mono',monospace">!</span>` : '';
    const rowClass = ev.status==='cancelled' ? 'cancelled' : isReview ? 'review-row' : '';
    return `<tr class="${rowClass}">
      <td class="mono" style="color:var(--muted);font-size:11px">${ev.event_id}</td>
      <td class="date-col">${reviewFlag}${ev.date||'?'}</td>
      <td>${venueCell}</td>
      <td style="color:var(--muted);font-size:12px">${festTour}</td>
      <td><div class="band-tags">${bandTags||'—'}</div></td>
      <td><div class="person-badges">${badges||'—'}</div></td>
      <td><span class="status-pill status-${ev.status}">${ev.status}</span></td>
      <td class="edit-col"><button class="edit-btn" onclick="openEditForm('${ev.event_id}')" title="Edit">✏</button></td>
    </tr>`;
  }).join('');
}

function computeBandsData() {
  const MAIN = ['L','S','Á'];
  const bandMap = {};
  DB.bands.forEach(b => {
    bandMap[b.band_id] = { band_id: b.band_id, band_name: b.band_name, L: 0, S: 0, 'Á': 0, cancelled: 0, _seen_events: new Set() };
  });
  DB.event_bands.forEach(eb => {
    if (!bandMap[eb.band_id]) return;
    if (eb.status === 'cancelled') bandMap[eb.band_id].cancelled++;
  });
  DB.attendance.forEach(a => {
    if (!a.did_see) return;
    if (!bandMap[a.band_id]) return;
    if (MAIN.includes(a.person_code)) {
      bandMap[a.band_id][a.person_code]++;
      bandMap[a.band_id]._seen_events.add(a.event_id);
    }
  });
  bandsData = Object.values(bandMap).map(b => ({ ...b, times_seen: b._seen_events.size }));
}

function applyBandFilters() {
  const q = document.getElementById('band-filter-input').value.toLowerCase().trim();
  filteredBands = bandsData.filter(b => {
    if (q && !b.band_name.toLowerCase().includes(q)) return false;
    return true;
  });
  sortBandsData();
  renderBandsTable();
}

function clearBandFilters() {
  document.getElementById('band-filter-input').value = '';
  personChecks = { L: false, S: false, 'Á': false };
  ['L','S','Á'].forEach(code => {
    const label = document.getElementById('chk-label-' + code);
    if (label) label.className = 'person-checkbox-label';
  });
  filteredBands = [...bandsData];
  sortBandsData();
  renderBandsTable();
}

function sortBandsBy(col) {
  if (bandSortCol === col) bandSortDir *= -1; else { bandSortCol = col; bandSortDir = -1; }
  ['name','seen','cancelled','L','S','Á'].forEach(s => { const el = document.getElementById('bth-' + s); if (el) el.classList.remove('sorted'); });
  const idMap = { band_name:'name', times_seen:'seen', cancelled:'cancelled', L:'L', S:'S', 'Á':'Á' };
  const el = document.getElementById('bth-' + idMap[col]);
  if (el) el.classList.add('sorted');
  sortBandsData();
  renderBandsTable();
}

function sortBandsData() {
  filteredBands.sort((a, b) => {
    const av = a[bandSortCol] ?? 0, bv = b[bandSortCol] ?? 0;
    if (typeof av === 'string') return av.localeCompare(bv) * bandSortDir;
    return (av - bv) * bandSortDir;
  });
}

function renderBandsTable() {
  document.getElementById('band-result-count').innerHTML =
    `Showing <span>${filteredBands.length}</span> of <span>${bandsData.length}</span> bands`;
  const tbody = document.getElementById('bands-tbody');
  if (filteredBands.length === 0) {
    tbody.innerHTML = `<tr><td colspan="6" class="empty-state">No bands match your filters.</td></tr>`;
    return;
  }
  tbody.innerHTML = filteredBands.map(b => `
    <tr>
      <td><span class="band-tag" onclick="goBand(${JSON.stringify(b.band_name)})" style="border:none;padding:0">${b.band_name}</span></td>
      <td class="mono" style="color:var(--accent)">${b.times_seen}</td>
      <td class="mono" style="color:${b.cancelled>0?'var(--accent2)':'var(--muted)'}">${b.cancelled||0}</td>
      <td class="mono" style="color:var(--luki)">${b.L||0}</td>
      <td class="mono" style="color:var(--sanyi)">${b.S||0}</td>
      <td class="mono" style="color:var(--arpi)">${b['Á']||0}</td>
    </tr>`).join('');
}

// FIX 4: "All" tab now counts distinct events per band, not sum across people
function renderTopBands() {
  const code = currentStatsPerson;
  const bandEventSets = {};
  DB.attendance.forEach(a => {
    if (!a.did_see) return;
    const match = code === 'ALL' ? ['L','S','Á'].includes(a.person_code) : a.person_code === code;
    if (!match) return;
    if (!bandEventSets[a.band_id]) bandEventSets[a.band_id] = new Set();
    bandEventSets[a.band_id].add(a.event_id);
  });
  const sorted = Object.entries(bandEventSets).map(([bid, evSet]) => [bid, evSet.size]).sort((a,b) => b[1]-a[1]).slice(0,50);
  const colorClass = code === 'ALL' ? 'count-ALL' : `count-${code}`;
  document.getElementById('top-bands-grid').innerHTML = sorted.map(([bid,count],i) => {
    const band = DB.bands.find(b=>b.band_id===bid);
    return `<div class="top-band-card" onclick="goBand(${JSON.stringify(band?.band_name||'')})">
      <div class="top-band-rank">${i+1}</div>
      <div class="top-band-name">${band?.band_name||'?'}</div>

// ── VENUE/CITY/COUNTRY SUGGESTION SYSTEM ─────────────────────
function buildVenueMap() {
  const map = {}; // venue -> {city, country}
  DB.events.forEach(e => {
    if (e.venue && e.venue !== 'CANCELLED') {
      if (!map[e.venue]) map[e.venue] = { city: e.city||'', country: e.country||'' };
    }
  });
  return map;
}

function suggestFromVenue(val) {
  const v = val.trim();
  if (!v) return;
  const vmap = buildVenueMap();
  const match = Object.entries(vmap).find(([k]) => k.toLowerCase() === v.toLowerCase());
  if (match) {
    const city    = document.getElementById('f-city-form');
    const country = document.getElementById('f-country');
    if (city    && !city.value)    city.value    = match[1].city;
    if (country && !country.value) country.value = match[1].country;
  }
}

function suggestFromCity(val) {
  const v = val.trim().toLowerCase();
  if (!v) return;
  // Find country for this city
  const ev = DB.events.find(e => e.city?.toLowerCase() === v && e.country);
  if (ev) {
    const country = document.getElementById('f-country');
    if (country && !country.value) country.value = ev.country;
  }
}

}

// ── THREE-STATE BAND PERSON TOGGLE ───────────────────────────
// States: '' (not there) → 'seen' → 'skip' → 'hate' → ''
function cycleBandPersonState(btn) {
  const idx  = parseInt(btn.dataset.idx);
  const code = btn.dataset.code;
  if (!formBandRows[idx]) return;
  if (!formBandRows[idx].personStates) formBandRows[idx].personStates = {};
  const cur = formBandRows[idx].personStates[code] || '';
  // Only allow seen/skip/hate if person was at event
  const atEvent = formEventAttendees.has(code);
  let next;
  if (!atEvent) return; // can't cycle if not at event
  if (cur === '')       next = 'seen';
  else if (cur === 'seen') next = 'skip';
  else if (cur === 'skip') next = 'hate';
  else                  next = '';

  formBandRows[idx].personStates[code] = next;
  // Keep attendees Set in sync (for legacy compatibility)
  if (!formBandRows[idx].attendees) formBandRows[idx].attendees = new Set();
  if (next === 'seen') formBandRows[idx].attendees.add(code);
  else                 formBandRows[idx].attendees.delete(code);

  // Update button appearance
  btn.className = 'band-person-toggle';
  if (next === 'seen') btn.classList.add('st-seen');
  else if (next === 'skip') btn.classList.add('st-skip');
  else if (next === 'hate') btn.classList.add('st-hate');
  btn.setAttribute('data-code', code);
  btn.setAttribute('data-idx', idx);
}

function buildBandRowHTML(idx, row) {
  const cancelledClass = row.status === 'cancelled' ? 'cancelled' : '';
  const mainPeople = MAIN_CODES.map(c => {
    const atEvent = formEventAttendees.has(c);
    const state   = row.personStates?.[c] || (row.attendees?.has(c) ? 'seen' : '');
    let stateCls  = '';
    if (state === 'seen') stateCls = 'st-seen';
    else if (state === 'skip') stateCls = 'st-skip';
    else if (state === 'hate') stateCls = 'st-hate';
    const dimmed = !atEvent ? 'opacity:0.25;cursor:default' : '';
    return `<button class="band-person-toggle ${stateCls}" data-code="${c}" data-idx="${idx}" onclick="cycleBandPersonState(this)" style="${dimmed}" title="${state||'not at event'}">${c}</button>`;
  }).join('');
  return `<div class="band-row" id="band-row-${idx}" data-idx="${idx}">
    <div class="typeahead-wrap">
      <input class="typeahead-input${row.is_new_band?' new-band':''}" id="band-input-${idx}" type="text"
        placeholder="Band name…" value="${escHtml(row.band_name)}"
        oninput="onBandInput(${idx},this.value)" onkeydown="onBandKeydown(event,${idx})" autocomplete="off">
      <div class="typeahead-dropdown" id="band-dd-${idx}" style="display:none"></div>
    </div>
    <button class="band-status-toggle ${cancelledClass}" id="band-status-${idx}" onclick="toggleBandStatus(${idx})">${row.status}</button>
    <div class="band-row-attendees" id="band-att-${idx}">${mainPeople}</div>
    <button class="band-remove-btn" onclick="removeBandRow(${idx})" title="Remove">×</button>
  </div>`;
}

function buildEventAttendeeToggles() {
  const visible = [...new Set([...MAIN_CODES, ...formEventAttendees])];
  const people  = DB.people.filter(p => visible.includes(p.person_code));
  const mainEntries = MAIN_CODES.map(c => people.find(p=>p.person_code===c) || { person_code:c, person_name:c });
  const extraEntries = people.filter(p => !MAIN_CODES.includes(p.person_code));
  return [...mainEntries, ...extraEntries].map(p => {
    const isMain   = MAIN_CODES.includes(p.person_code);
    const isActive = formEventAttendees.has(p.person_code);
    const cls      = isActive ? (isMain ? 'active' : 'active-other') : '';
    return `<button class="person-toggle ${cls}" data-code="${escHtml(p.person_code)}"
      onclick="toggleEventAttendee(this)" title="${escHtml(p.person_name)}">${escHtml(p.person_code)}</button>`;
  }).join('');
}

function toggleEventAttendee(btn) {
  const code = btn.dataset.code;
  if (formEventAttendees.has(code)) { formEventAttendees.delete(code); btn.classList.remove('active','active-other'); }
  else { formEventAttendees.add(code); btn.classList.add(MAIN_CODES.includes(code) ? 'active' : 'active-other'); }
}

function buildAllBandRows() {
  return formBandRows.map((row,idx) => row ? buildBandRowHTML(idx,row) : '').join('');
}

function addBandRow(rowData) {
  const idx = formBandRows.length;
  const row = rowData || { band_id: null, band_name: '', status: 'performed', attendees: new Set(), personStates: {} };
  formBandRows.push(row);
  const container = document.getElementById('band-rows');
  if (container) { const div = document.createElement('div'); div.innerHTML = buildBandRowHTML(idx, row); container.appendChild(div.firstElementChild); }
}

function removeBandRow(idx) {
  formBandRows[idx] = null;
  const el = document.getElementById(`band-row-${idx}`);
  if (el) el.remove();
}

function toggleBandStatus(idx) {
  if (!formBandRows[idx]) return;
  formBandRows[idx].status = formBandRows[idx].status === 'cancelled' ? 'performed' : 'cancelled';
  const btn = document.getElementById(`band-status-${idx}`);
  if (btn) { btn.textContent = formBandRows[idx].status; btn.classList.toggle('cancelled', formBandRows[idx].status==='cancelled'); }
}

function onBandInput(idx, val) {
  if (!formBandRows[idx]) return;
  formBandRows[idx].band_name = val;
  formBandRows[idx].band_id = null;
  formBandRows[idx].is_new_band = false;
  clearTimeout(typeaheadTimers[idx]);
  typeaheadTimers[idx] = setTimeout(() => showBandDropdown(idx, val), 130);
}

function showBandDropdown(idx, val) {
  const dd = document.getElementById(`band-dd-${idx}`);
  const input = document.getElementById(`band-input-${idx}`);
  if (!dd) return;
  if (!val?.trim()) { dd.style.display='none'; return; }
  const q = val.toLowerCase().trim();
  const matches = DB.bands.filter(b => b.band_name.toLowerCase().includes(q)).slice(0,12);
  const exact = DB.bands.find(b => b.band_name.toLowerCase() === q);
  if (input) input.classList.toggle('new-band', !exact && val.length > 0);
  let html = matches.map(b => `<div class="typeahead-item" onclick="selectBand(${idx},'${b.band_id}',${JSON.stringify(b.band_name)})">${escHtml(b.band_name)}</div>`).join('');
  if (!exact && val.trim()) html += `<div class="typeahead-item new-entry" onclick="selectNewBand(${idx},${JSON.stringify(val.trim())})">${escHtml(val.trim())} (new band)</div>`;
  dd.innerHTML = html;
  dd.style.display = html ? 'block' : 'none';
}

function onBandKeydown(e, idx) {
  const dd = document.getElementById(`band-dd-${idx}`);
  if (!dd || dd.style.display==='none') return;
  const items = dd.querySelectorAll('.typeahead-item');
  let cur = [...items].findIndex(el => el.classList.contains('kbd-active'));
  if (e.key==='ArrowDown')  { e.preventDefault(); cur = Math.min(cur+1, items.length-1); }
  else if (e.key==='ArrowUp')   { e.preventDefault(); cur = Math.max(cur-1, 0); }
  else if (e.key==='Enter') { e.preventDefault(); (items[cur>=0?cur:0])?.click(); return; }
  else if (e.key==='Escape'){ dd.style.display='none'; return; }
  items.forEach((el,i) => el.classList.toggle('kbd-active', i===cur));
}

function selectBand(idx, band_id, band_name) {
  if (!formBandRows[idx]) return;
  formBandRows[idx].band_id = String(band_id);
  formBandRows[idx].band_name = band_name;
  formBandRows[idx].is_new_band = false;
  const input = document.getElementById(`band-input-${idx}`);
  const dd    = document.getElementById(`band-dd-${idx}`);
  if (input) { input.value = band_name; input.classList.remove('new-band'); }
  if (dd) dd.style.display = 'none';
}

function selectNewBand(idx, name) {
  if (!formBandRows[idx]) return;
  formBandRows[idx].band_id = null;
  formBandRows[idx].band_name = name;
  formBandRows[idx].is_new_band = true;
  const input = document.getElementById(`band-input-${idx}`);
  const dd    = document.getElementById(`band-dd-${idx}`);
  if (input) { input.value = name; input.classList.add('new-band'); }
  if (dd) dd.style.display = 'none';
}

document.addEventListener('click', e => {
  document.querySelectorAll('.typeahead-dropdown').forEach(dd => {
    const row = dd.closest('.band-row');
    if (row && !row.contains(e.target)) dd.style.display = 'none';
  });
}, { passive: true });

function openPersonPicker(target) {
  personPickerTarget = target;
  personPickerTemp = new Set(target === 'event' ? formEventAttendees : (formBandRows[target.bandIdx]?.attendees || new Set()));
  const extras = DB.people.filter(p => !MAIN_CODES.includes(p.person_code));
  document.getElementById('person-picker-list').innerHTML = extras.map(p => `
    <label class="person-picker-item">
      <input type="checkbox" value="${escHtml(p.person_code)}" ${personPickerTemp.has(p.person_code)?'checked':''}
        onchange="pickerToggle(this)">
      <span>${escHtml(p.person_name)} (${escHtml(p.person_code)})</span>
    </label>`).join('') || '<div style="color:var(--muted);font-size:12px;padding:8px">No additional people in database yet.</div>';
  document.getElementById('new-person-name').value = '';
  document.getElementById('new-person-code').value = '';
  document.getElementById('person-picker').classList.add('open');
}

function pickerToggle(cb) {
  if (cb.checked) personPickerTemp.add(cb.value); else personPickerTemp.delete(cb.value);
}

async function createNewPerson() {
  const name = document.getElementById('new-person-name').value.trim();
  const code = document.getElementById('new-person-code').value.trim();
  if (!name || !code) { alert('Name and code are both required.'); return; }
  if (DB.people.find(p => p.person_code === code)) { alert(`Code "${code}" already exists.`); return; }
  try {
    const r = await fetch('api.php', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ action:'add_person', person_name:name, person_code:code }) });
    const j = await r.json();
    if (j.error) throw new Error(j.error);
    DB.people.push({ person_code: code, person_name: name, is_maintainer: 'no' });
    personPickerTemp.add(code);
    openPersonPicker(personPickerTarget);
  } catch(e) { alert('Error: ' + e.message); }
}

function confirmPersonPicker() {
  if (personPickerTarget === 'event') {
    DB.people.filter(p => !MAIN_CODES.includes(p.person_code)).forEach(p => {
      if (personPickerTemp.has(p.person_code)) formEventAttendees.add(p.person_code);
      else formEventAttendees.delete(p.person_code);
    });
    const tog = document.getElementById('event-attendee-toggles');
    if (tog) tog.innerHTML = buildEventAttendeeToggles() + `<button class="add-person-btn" onclick="openPersonPicker('event')">+ more</button>`;
  }
  closePersonPicker();
}

function closePersonPicker() {
  document.getElementById('person-picker').classList.remove('open');
}

async function markAs(status) {
  if (!editEventId) return;
  if (!confirm(status==='cancelled' ? 'Mark this event as CANCELLED?' : 'Mark this event as PAST?')) return;
  const sel = document.getElementById('f-status-form');
  if (sel) sel.value = status;
  await saveEvent();
}

async function saveEvent() {
  const btn = document.getElementById('btn-save');
  if (btn) btn.disabled = true;

  const date      = (document.getElementById('f-date')?.value||'').trim();
  const status    = document.getElementById('f-status-form')?.value || 'upcoming';
  const city      = (document.getElementById('f-city-form')?.value||'').trim();
  const country   = (document.getElementById('f-country')?.value||'').trim();
  const venue     = (document.getElementById('f-venue')?.value||'').trim();
  const ftType    = document.getElementById('f-festtour-type')?.value || 'festival';
  const ftVal     = (document.getElementById('f-festtour')?.value||'').trim();
  const festival  = ftType === 'festival' ? ftVal : '';
  const tour      = ftType === 'tour'     ? ftVal : '';
  const price     = (document.getElementById('f-price')?.value||'').trim();
  const currency  = document.getElementById('f-currency')?.value||'';
  const priceNote = (document.getElementById('f-price-note')?.value||'').trim();
  const notes     = (document.getElementById('f-notes')?.value||'').trim();
  const eventUrl  = (document.getElementById('f-event-url')?.value||'').trim();
  const ticketUrl = (document.getElementById('f-ticket-url')?.value||'').trim();

  if (!date) { showFormMsg('error','Date is required.'); if(btn) btn.disabled=false; return; }

  const bands = formBandRows
    .filter(r => r !== null && r.band_name.trim() !== '')
    .map(r => ({ band_id: r.band_id||null, band_name: r.band_name.trim(), status: r.status||'performed', is_new: r.is_new_band||false, attendees: [...(r.attendees||[])] }));

  const payload = {
    action: formMode==='edit' ? 'edit_event' : 'add_event',
    event_id: editEventId||null,
    date, status, city, country, venue, festival, tour,
    ticket_price_original: price, ticket_currency: currency, price_note: priceNote,
    event_url: eventUrl, ticket_url: ticketUrl, notes,
    event_attendees: [...formEventAttendees],
    bands
  };

  try {
    const r = await fetch('api.php', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) });
    if (r.status===401) { window.location.href='login.php'; return; }
    const j = await r.json();
    if (j.error) throw new Error(j.error);

    showFormMsg('success', formMode==='edit' ? 'Changes saved.' : 'Concert added!');

    const fresh = await fetch(API_URL);
    const fd = await fresh.json();
    fd.attendance = fd.attendance.map(a=>({...a,was_at_event:a.was_at_event==='True',did_see:a.did_see==='True',hated_it:a.hated_it==='True'}));
    fd.events      = fd.events.map(e=>({...e,event_id:String(e.event_id)}));
    fd.bands       = fd.bands.map(b=>({...b,band_id:String(b.band_id)}));
    fd.event_bands = fd.event_bands.map(eb=>({...eb,event_id:String(eb.event_id),band_id:String(eb.band_id),event_band_id:String(eb.event_band_id)}));
    fd.attendance  = fd.attendance.map(a=>({...a,event_id:String(a.event_id),band_id:String(a.band_id),event_band_id:String(a.event_band_id)}));
    DB = fd;

    filteredEvents = [...DB.events];
    sortEvents();
    computeBandsData();
    filteredBands = [...bandsData];
    applyFilters();
    renderBandsTable();

    if (formMode==='add') { setTimeout(()=>renderAddView(), 1500); }
    else                  { setTimeout(()=>closeFormModal(),  1200); }
  } catch(e) {
    showFormMsg('error','Error: '+e.message);
  } finally {
    if (btn) btn.disabled=false;
  }
}

function showFormMsg(type, msg) {
  const el = document.getElementById('form-msg');
  if (!el) return;
  el.textContent = msg;
  el.className = `form-msg ${type}`;
  setTimeout(()=>{ if(el) el.className='form-msg'; }, 4000);
}

function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Live-update URL icon hrefs as user types

  if (e.target.id === 'f-event-url') {
    const btn = document.getElementById('event-url-btn');
    if (btn) btn.href = e.target.value || '#';
  }
  if (e.target.id === 'f-ticket-url') {
    const btn = document.getElementById('ticket-url-btn');
    if (btn) btn.href = e.target.value || '#';
  }
});
